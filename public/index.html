<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automador ServiceNow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-4px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .log-line { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 gap-6">
    <div class="w-full max-w-4xl bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-xl font-semibold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    Automador ServiceNow
                </h1>
                <p class="text-slate-400 text-sm mt-1">Encerramento automático de incidentes (Versão Simplificada)</p>
            </div>
            <div id="status-badge" class="flex items-center gap-2 px-3 py-1 bg-slate-800 rounded-full border border-slate-700">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-green-400"></div>
                <span id="status-text" class="text-xs font-medium text-slate-300">Pronto</span>
            </div>
        </div>

        <div class="grid md:grid-cols-2 divide-x divide-slate-100">
            <form id="automation-form" class="p-6 space-y-4">
                <div class="space-y-1.5">
                    <label for="url" class="text-xs font-bold text-slate-500 uppercase tracking-wider block">URL do ServiceNow</label>
                    <div class="relative">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-3 top-2.5 text-slate-400"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                        <input id="url" type="url" required value="https://gpabrqa.service-now.com/" class="w-full pl-9 pr-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-sm">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label for="incidente" class="text-xs font-bold text-slate-500 uppercase tracking-wider block">Número do INC</label>
                    <input id="incidente" type="text" required placeholder="Ex: INC009294985" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-sm">
                </div>

                <div class="space-y-1.5">
                    <label for="justificativa" class="text-xs font-bold text-slate-500 uppercase tracking-wider block">Justificativa Técnica</label>
                    <textarea id="justificativa" required rows="4" placeholder="Descreva a solução aplicada..." class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-sm resize-none"></textarea>
                </div>

                <div class="flex items-center gap-3 p-3 bg-slate-50 rounded-lg border border-slate-100">
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="debug" class="sr-only peer">
                        <div class="w-10 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
                        <span class="ml-3 text-xs font-semibold text-slate-600 flex items-center gap-2">
                            Modo Debug (Navegador Visível)
                        </span>
                    </label>
                </div>

                <button id="submit-btn" type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg shadow-blue-100 transition-all flex items-center justify-center gap-2">
                    Iniciar Automação
                </button>
            </form>

            <div class="bg-slate-950 p-4 flex flex-col h-[450px]">
                <div class="flex items-center gap-2 text-slate-400 mb-3 border-b border-slate-800 pb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
                    <span class="text-xs font-bold uppercase tracking-widest">Log de Execução</span>
                </div>
                
                <div id="log-container" class="flex-1 overflow-y-auto font-mono text-[11px] space-y-1 custom-scrollbar scroll-smooth"></div>

                <div id="result-container" class="hidden mt-4 p-3 rounded-lg border">
                    <div class="flex items-center gap-2">
                        <div id="result-icon"></div>
                        <span id="result-title" class="text-xs font-bold"></span>
                    </div>
                    <p id="result-message" class="text-[10px] mt-1 opacity-80"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('automation-form');
        const submitBtn = document.getElementById('submit-btn');
        const logContainer = document.getElementById('log-container');
        const resultContainer = document.getElementById('result-container');
        const resultTitle = document.getElementById('result-title');
        const resultMessage = document.getElementById('result-message');
        const resultIcon = document.getElementById('result-icon');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        // SSE Connection
        const eventSource = new EventSource('/api/logs');
        eventSource.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const logLine = document.createElement('div');
            logLine.className = "log-line flex gap-2 border-b border-slate-900/50 pb-0.5 mb-0.5 last:border-0";
            
            const timeStr = new Date(data.timestamp).toLocaleTimeString([], { hour12: false });
            const isError = data.message.startsWith('ERRO');
            
            logLine.innerHTML = `
                <span class="text-slate-500 shrink-0">[${timeStr}]</span>
                <span class="break-words ${isError ? 'text-red-400 font-bold' : 'text-blue-300'}">
                    ${data.message}
                </span>
            `;
            
            logContainer.appendChild(logLine);
            logContainer.scrollTop = logContainer.scrollHeight;
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const url = document.getElementById('url').value;
            const incidente = document.getElementById('incidente').value;
            const justificativa = document.getElementById('justificativa').value;
            const debug = document.getElementById('debug').checked;

            // UI State
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<svg class="animate-spin h-5 w-5 mr-3" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Processando...';
            statusDot.className = 'w-2 h-2 rounded-full bg-yellow-400 animate-pulse';
            statusText.innerText = 'Executando';
            logContainer.innerHTML = '';
            resultContainer.className = 'hidden';

            try {
                const response = await fetch('/api/encerrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, incidente, justificativa, debug })
                });

                const data = await response.json();
                
                resultContainer.className = `mt-4 p-3 rounded-lg border ${data.success ? 'bg-green-900/20 border-green-800/50 text-green-400 block' : 'bg-red-900/20 border-red-800/50 text-red-400 block'}`;
                resultTitle.innerText = data.success ? 'CONCLUÍDO' : 'FALHA';
                resultMessage.innerText = data.message;
                resultIcon.innerHTML = data.success ? '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>' : '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';
            } catch (error) {
                resultContainer.className = 'mt-4 p-3 rounded-lg border bg-red-900/20 border-red-800/50 text-red-400 block';
                resultTitle.innerText = 'ERRO';
                resultMessage.innerText = 'Erro ao conectar com o servidor.';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Iniciar Automação';
                statusDot.className = 'w-2 h-2 rounded-full bg-green-400';
                statusText.innerText = 'Pronto';
            }
        };
    </script>
</body>
</html>
